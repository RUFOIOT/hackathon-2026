<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Hackathon Eight Academy 2026</title>
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --border: rgba(255,255,255,0.08);
    --accent: #4f7cff;
    --accent2: #a855f7;
    --green: #22c55e;
    --yellow: #f59e0b;
    --red: #ef4444;
    --text: #f1f5f9;
    --muted: #64748b;
    --card: #16161f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0d0d1a, #1a0a2e);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 { font-size: 1.3rem; font-weight: 700; }
  .header h1 span { color: var(--accent); }
  .badge { background: linear-gradient(135deg, var(--accent), var(--accent2)); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
  .last-update { color: var(--muted); font-size: 0.8rem; }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; padding: 24px 32px 0; }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .stat-card.blue::before { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .stat-card.green::before { background: var(--green); }
  .stat-card.yellow::before { background: var(--yellow); }
  .stat-card.red::before { background: var(--red); }
  .stat-label { color: var(--muted); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .stat-value { font-size: 2.2rem; font-weight: 800; line-height: 1; }
  .stat-sub { color: var(--muted); font-size: 0.75rem; margin-top: 4px; }

  /* TABS */
  .tabs { padding: 24px 32px 0; display: flex; gap: 8px; }
  .tab {
    padding: 8px 20px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); cursor: pointer; font-size: 0.88rem;
    transition: all 0.2s;
  }
  .tab.active { background: var(--accent); border-color: var(--accent); color: white; font-weight: 600; }
  .tab:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

  /* TOOLBAR */
  .toolbar {
    padding: 16px 32px;
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  }
  .search-box {
    flex: 1; min-width: 200px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px; color: var(--text); font-size: 0.9rem;
    outline: none;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }
  .filter-select {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 0.88rem;
    outline: none; cursor: pointer;
  }
  .btn {
    padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 0.85rem; font-weight: 600; transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #3d6ae8; }
  .btn-success { background: var(--green); color: white; }
  .btn-success:hover { background: #16a34a; }
  .btn-danger { background: var(--red); color: white; }
  .btn-danger:hover { background: #dc2626; }
  .btn-ghost { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* TABLE */
  .table-wrap { padding: 0 32px 32px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  thead th {
    background: var(--bg3);
    padding: 12px 14px;
    text-align: left;
    color: var(--muted);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  thead th:first-child { border-radius: 8px 0 0 0; }
  thead th:last-child { border-radius: 0 8px 0 0; }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:hover { background: var(--bg3); }
  tbody tr.test-row { opacity: 0.4; }
  td { padding: 12px 14px; vertical-align: top; }
  td .name { font-weight: 600; color: var(--text); }
  td .sub { color: var(--muted); font-size: 0.78rem; margin-top: 2px; }

  .pill {
    display: inline-block;
    padding: 2px 10px; border-radius: 20px; font-size: 0.73rem; font-weight: 600;
  }
  .pill-blue { background: rgba(79,124,255,0.15); color: #7aa3ff; border: 1px solid rgba(79,124,255,0.3); }
  .pill-purple { background: rgba(168,85,247,0.15); color: #c084fc; border: 1px solid rgba(168,85,247,0.3); }
  .pill-green { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
  .pill-yellow { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
  .pill-red { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
  .pill-gray { background: rgba(100,116,139,0.15); color: #94a3b8; border: 1px solid rgba(100,116,139,0.3); }

  .integrantes-cell { max-width: 200px; color: var(--muted); font-size: 0.78rem; white-space: pre-line; }
  .idea-cell { max-width: 220px; color: var(--muted); font-size: 0.78rem; }

  .action-btns { display: flex; gap: 6px; }
  .icon-btn {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 8px; cursor: pointer; font-size: 0.8rem;
    transition: all 0.15s; color: var(--muted);
  }
  .icon-btn:hover { border-color: var(--red); color: var(--red); }
  .icon-btn.copy:hover { border-color: var(--accent); color: var(--accent); }

  /* COUNT */
  .count-label { color: var(--muted); font-size: 0.82rem; padding: 0 32px 8px; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 16px;
    padding: 28px; max-width: 520px; width: 90%; max-height: 80vh; overflow-y: auto;
  }
  .modal h3 { font-size: 1.1rem; margin-bottom: 16px; }
  .field-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
  .field-label { color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .field-value { color: var(--text); font-size: 0.9rem; background: var(--bg3); padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); word-break: break-word; }
  .modal-close { float: right; background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; }

  /* EMPTY */
  .empty { padding: 60px; text-align: center; color: var(--muted); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--green); color: white; padding: 12px 20px;
    border-radius: 10px; font-size: 0.88rem; font-weight: 600;
    transform: translateY(100px); opacity: 0; transition: all 0.3s; z-index: 200;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { background: var(--red); }

  @media (max-width: 600px) {
    .header, .stats, .tabs, .toolbar, .table-wrap, .count-label { padding-left: 16px; padding-right: 16px; }
    .stat-value { font-size: 1.6rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>⚡ <span>Hackathon</span> Eight Academy 2026</h1>
    <div class="last-update" id="lastUpdate">Cargando datos...</div>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <span class="badge">Admin Panel</span>
    <button class="btn btn-primary" onclick="loadAll()">🔄 Actualizar</button>
  </div>
</div>

<div class="stats">
  <div class="stat-card blue">
    <div class="stat-label">Total Registros</div>
    <div class="stat-value" id="statTotal">—</div>
    <div class="stat-sub">estudiantes + mentores</div>
  </div>
  <div class="stat-card green">
    <div class="stat-label">Equipos</div>
    <div class="stat-value" id="statEquipos">—</div>
    <div class="stat-sub">inscritos</div>
  </div>
  <div class="stat-card yellow">
    <div class="stat-label">Mentores</div>
    <div class="stat-value" id="statMentores">—</div>
    <div class="stat-sub">postulados</div>
  </div>
  <div class="stat-card red">
    <div class="stat-label">Eje más popular</div>
    <div class="stat-value" style="font-size:1.2rem;margin-top:4px;" id="statEje">—</div>
    <div class="stat-sub" id="statEjeSub">—</div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('equipos', this)">👥 Equipos (<span id="tabCountE">0</span>)</button>
  <button class="tab" onclick="switchTab('mentores', this)">🎓 Mentores (<span id="tabCountM">0</span>)</button>
</div>

<div class="toolbar">
  <input class="search-box" type="text" id="searchBox" placeholder="🔍 Buscar por nombre, equipo, email..." oninput="renderTable()">
  <select class="filter-select" id="filterEje" onchange="renderTable()">
    <option value="">Todos los ejes</option>
    <option value="IA">IA</option>
    <option value="Blockchain">Blockchain</option>
    <option value="ODS">ODS</option>
    <option value="Combinado">Combinado</option>
  </select>
  <button class="btn btn-ghost" onclick="toggleTests()">👁 Tests</button>
  <button class="btn btn-success" onclick="exportCSV()">📥 Exportar CSV</button>
</div>

<div class="count-label" id="countLabel"></div>

<div class="table-wrap">
  <div id="tableContainer"></div>
</div>

<!-- Modal detalle -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">✕</button>
    <h3 id="modalTitle">Detalle</h3>
    <div id="modalContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_KEY = 'AIzaSyDVP4Gg-nQ_0vZNhII-LjHMpDT4mH8_PZw';
const PROJECT = 'vibramente-ce5b8';
const BASE = `https://firestore.googleapis.com/v1/projects/${PROJECT}/databases/(default)/documents`;

let allEquipos = [];
let allMentores = [];
let currentTab = 'equipos';
let showTests = false;

function fsVal(v) {
  if (!v) return '';
  if (v.stringValue !== undefined) return v.stringValue;
  if (v.integerValue !== undefined) return v.integerValue;
  if (v.timestampValue !== undefined) return new Date(v.timestampValue).toLocaleString('es-EC');
  return '';
}

function parseDoc(doc, type) {
  const f = doc.fields || {};
  const id = doc.name.split('/').pop();
  const created = doc.createTime ? new Date(doc.createTime).toLocaleString('es-EC') : '—';
  if (type === 'equipo') {
    return {
      id, created,
      nombre: fsVal(f.nombre),
      edad: fsVal(f.edad),
      email: fsVal(f.email),
      telefono: fsVal(f.telefono),
      institucion: fsVal(f.institucion),
      equipo: fsVal(f.equipo),
      integrantes: fsVal(f.integrantes),
      eje: fsVal(f.eje),
      demoweek: fsVal(f.demoweek),
      idea: fsVal(f.idea),
      isTest: (fsVal(f.nombre)||'').includes('TEST') || (fsVal(f.equipo)||'').includes('TEST') || (fsVal(f.idea)||'').includes('PRUEBA')
    };
  } else {
    return {
      id, created,
      nombre: fsVal(f.nombre),
      area: fsVal(f.areaCargo) || fsVal(f.area),
      email: fsVal(f.email),
      telefono: fsVal(f.telefono),
      expertise: fsVal(f.expertise),
      motivo: fsVal(f.motivo),
      isTest: (fsVal(f.nombre)||'').includes('TEST') || (fsVal(f.motivo)||'').includes('PRUEBA')
    };
  }
}

async function fetchCollection(col) {
  const r = await fetch(`${BASE}/${col}?key=${API_KEY}&pageSize=100`);
  const data = await r.json();
  return data.documents || [];
}

async function loadAll() {
  document.getElementById('lastUpdate').textContent = 'Actualizando...';
  try {
    const [eDocs, mDocs] = await Promise.all([
      fetchCollection('hackathon_registros'),
      fetchCollection('hackathon_mentores')
    ]);
    allEquipos = eDocs.map(d => parseDoc(d, 'equipo'));
    allMentores = mDocs.map(d => parseDoc(d, 'mentor'));

    // Stats
    const realE = allEquipos.filter(e => !e.isTest);
    const realM = allMentores.filter(m => !m.isTest);
    document.getElementById('statTotal').textContent = realE.length + realM.length;
    document.getElementById('statEquipos').textContent = realE.length;
    document.getElementById('statMentores').textContent = realM.length;
    document.getElementById('tabCountE').textContent = realE.length;
    document.getElementById('tabCountM').textContent = realM.length;

    // Eje más popular
    const ejes = {};
    realE.forEach(e => { if (e.eje) ejes[e.eje] = (ejes[e.eje]||0)+1; });
    const topEje = Object.entries(ejes).sort((a,b)=>b[1]-a[1])[0];
    document.getElementById('statEje').textContent = topEje ? topEje[0] : '—';
    document.getElementById('statEjeSub').textContent = topEje ? `${topEje[1]} equipos` : '';

    document.getElementById('lastUpdate').textContent = `Última actualización: ${new Date().toLocaleString('es-EC')}`;
    renderTable();
  } catch(e) {
    document.getElementById('lastUpdate').textContent = 'Error al cargar datos';
    console.error(e);
  }
}

function toggleTests() { showTests = !showTests; renderTable(); }

function filtered() {
  const q = (document.getElementById('searchBox').value || '').toLowerCase();
  const eje = document.getElementById('filterEje').value;
  let data = currentTab === 'equipos' ? allEquipos : allMentores;
  if (!showTests) data = data.filter(r => !r.isTest);
  if (q) data = data.filter(r => JSON.stringify(r).toLowerCase().includes(q));
  if (eje && currentTab === 'equipos') data = data.filter(r => r.eje === eje);
  return data;
}

function ejePill(eje) {
  const map = { IA: 'pill-blue', Blockchain: 'pill-purple', ODS: 'pill-green', Combinado: 'pill-yellow' };
  return `<span class="pill ${map[eje]||'pill-gray'}">${eje||'—'}</span>`;
}

function demoweekPill(dw) {
  if (!dw) return '<span class="pill pill-gray">—</span>';
  if (dw.includes('1 y 2')) return `<span class="pill pill-green">${dw}</span>`;
  return `<span class="pill pill-yellow">${dw}</span>`;
}

function renderTable() {
  const data = filtered();
  document.getElementById('countLabel').textContent = `${data.length} registro${data.length !== 1 ? 's' : ''} encontrados`;
  const container = document.getElementById('tableContainer');

  if (!data.length) {
    container.innerHTML = '<div class="empty">Sin resultados para los filtros actuales.</div>';
    return;
  }

  if (currentTab === 'equipos') {
    container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Nombre / Institución</th>
          <th>Equipo</th>
          <th>Eje</th>
          <th>DemoWeek</th>
          <th>Integrantes</th>
          <th>Contacto</th>
          <th>Fecha</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        ${data.map((r, i) => `
        <tr class="${r.isTest ? 'test-row' : ''}">
          <td><span style="color:var(--muted);font-size:0.8rem;">${i+1}</span></td>
          <td>
            <div class="name">${r.nombre||'—'}</div>
            <div class="sub">${r.institucion||''} ${r.edad ? '· '+r.edad+' años':''}</div>
          </td>
          <td><div class="name" style="color:var(--accent)">${r.equipo||'—'}</div></td>
          <td>${ejePill(r.eje)}</td>
          <td>${demoweekPill(r.demoweek)}</td>
          <td><div class="integrantes-cell">${(r.integrantes||'—').substring(0,80)}${r.integrantes && r.integrantes.length > 80 ? '...' : ''}</div></td>
          <td>
            <div class="sub">${r.email||'—'}</div>
            <div class="sub">${r.telefono||''}</div>
          </td>
          <td><div class="sub">${r.created}</div></td>
          <td>
            <div class="action-btns">
              <button class="icon-btn copy" onclick="copyEmail('${r.email}')" title="Copiar email">📋</button>
              <button class="icon-btn" onclick="showDetail('equipo','${r.id}')" title="Ver detalle">👁</button>
              <button class="icon-btn" onclick="deleteDoc('hackathon_registros','${r.id}','${r.nombre}')" title="Eliminar">🗑</button>
            </div>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  } else {
    container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Nombre</th>
          <th>Área / Cargo</th>
          <th>Expertise</th>
          <th>Motivo</th>
          <th>Contacto</th>
          <th>Fecha</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        ${data.map((r, i) => `
        <tr class="${r.isTest ? 'test-row' : ''}">
          <td><span style="color:var(--muted);font-size:0.8rem;">${i+1}</span></td>
          <td><div class="name">${r.nombre||'—'}</div></td>
          <td><span class="pill pill-purple">${r.area||'—'}</span></td>
          <td><div class="idea-cell">${(r.expertise||'—').substring(0,80)}...</div></td>
          <td><div class="idea-cell">${(r.motivo||'—').substring(0,60)}...</div></td>
          <td>
            <div class="sub">${r.email||'—'}</div>
            <div class="sub">${r.telefono||''}</div>
          </td>
          <td><div class="sub">${r.created}</div></td>
          <td>
            <div class="action-btns">
              <button class="icon-btn copy" onclick="copyEmail('${r.email}')" title="Copiar email">📋</button>
              <button class="icon-btn" onclick="showDetail('mentor','${r.id}')" title="Ver detalle">👁</button>
              <button class="icon-btn" onclick="deleteDoc('hackathon_mentores','${r.id}','${r.nombre}')" title="Eliminar">🗑</button>
            </div>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  }
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('filterEje').style.display = tab === 'equipos' ? '' : 'none';
  renderTable();
}

function showDetail(type, id) {
  const data = type === 'equipo'
    ? allEquipos.find(r => r.id === id)
    : allMentores.find(r => r.id === id);
  if (!data) return;
  document.getElementById('modalTitle').textContent = type === 'equipo' ? `👥 ${data.nombre} — ${data.equipo}` : `🎓 ${data.nombre}`;
  const fields = type === 'equipo'
    ? [['Nombre', data.nombre], ['Edad', data.edad], ['Email', data.email], ['Teléfono', data.telefono], ['Institución', data.institucion], ['Equipo', data.equipo], ['Integrantes', data.integrantes], ['Eje Temático', data.eje], ['DemoWeek', data.demoweek], ['Idea del Proyecto', data.idea], ['Fecha Registro', data.created]]
    : [['Nombre', data.nombre], ['Área/Cargo', data.area], ['Email', data.email], ['Teléfono', data.telefono], ['Expertise', data.expertise], ['Motivo', data.motivo], ['Fecha Registro', data.created]];
  document.getElementById('modalContent').innerHTML = fields.map(([l, v]) => `
    <div class="field-row">
      <div class="field-label">${l}</div>
      <div class="field-value">${v || '—'}</div>
    </div>`).join('');
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}

function copyEmail(email) {
  if (!email) return;
  navigator.clipboard.writeText(email).then(() => showToast(`📋 Email copiado: ${email}`));
}

async function deleteDoc(collection, id, nombre) {
  if (!confirm(`¿Eliminar registro de "${nombre}"?\nEsta acción no se puede deshacer.`)) return;
  try {
    const r = await fetch(`${BASE}/${collection}/${id}?key=${API_KEY}`, { method: 'DELETE' });
    if (r.ok) {
      showToast(`🗑 Eliminado: ${nombre}`);
      await loadAll();
    } else {
      showToast('Error al eliminar — verifica permisos de Firestore', true);
    }
  } catch(e) {
    showToast('Error de red', true);
  }
}

function exportCSV() {
  const data = filtered();
  if (!data.length) return;
  let csv;
  if (currentTab === 'equipos') {
    const headers = ['Nombre','Edad','Email','Telefono','Institucion','Equipo','Integrantes','Eje','DemoWeek','Idea','Fecha'];
    const rows = data.map(r => [r.nombre,r.edad,r.email,r.telefono,r.institucion,r.equipo,`"${(r.integrantes||'').replace(/"/g,'""')}"`,r.eje,r.demoweek,`"${(r.idea||'').replace(/"/g,'""')}"`,r.created]);
    csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  } else {
    const headers = ['Nombre','Area','Email','Telefono','Expertise','Motivo','Fecha'];
    const rows = data.map(r => [r.nombre,r.area,r.email,r.telefono,`"${(r.expertise||'').replace(/"/g,'""')}"`,`"${(r.motivo||'').replace(/"/g,'""')}"`,r.created]);
    csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  }
  const blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `hackathon_${currentTab}_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  showToast(`📥 CSV exportado (${data.length} registros)`);
}

function showToast(msg, error = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (error ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Init
document.getElementById('filterEje').style.display = '';
loadAll();
</script>
